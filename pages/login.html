<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="../favicon.svg">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--bg-light) 0%, var(--primary) 100%);
            padding: 20px;
        }

        .auth-card {
            background: white;
            padding: 50px 40px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 450px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .auth-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 5px;
            background: linear-gradient(to right, var(--primary), var(--secondary));
        }

        .social-login {
            margin: 30px 0;
            border-top: 1px solid #eee;
            padding-top: 30px;
        }

        .social-title {
            font-size: 14px;
            color: var(--text-light);
            margin-bottom: 20px;
        }

        .social-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .social-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 2px solid #eee;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: var(--transition);
            font-size: 20px;
        }

        .social-btn.google {
            border-color: #f1f1f1;
            background: #ffffff;
        }

        .social-btn.google:hover {
            background: #ffffff;
            border-color: #4285F4;
        }

        .social-btn.facebook {
            color: #1877f2;
            border-color: #e7f0ff;
        }

        .social-btn.twitter {
            color: #000000;
            border-color: #eee;
        }

        .social-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            background: #f8f9fa;
        }

        .auth-title {
            text-align: center;
            margin-bottom: 25px;
        }

        .auth-title h2 {
            font-size: 1.25rem;
            margin-bottom: 5px;
            color: var(--primary);
        }

        .auth-title p {
            font-size: 0.85rem;
            color: var(--text-light);
        }

        .auth-link {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: var(--text-light);
        }

        .auth-link a {
            color: var(--primary);
            font-weight: 600;
        }

        .back-home {
            background: rgba(255, 255, 255, 0.9);
            border: 2px solid var(--primary);
            color: var(--primary);
            padding: 8px 16px;
            border-radius: 25px;
            text-decoration: none;
            font-weight: 600;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
        }

        .back-home:hover {
            background: var(--primary);
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(42, 92, 130, 0.3);
        }

        @media (max-width: 480px) {
            .back-home {
                padding: 6px 12px;
                font-size: 12px;
            }
        }
    </style>
</head>

<body>

    <main class="auth-container">
        <div class="auth-card" style="border-top: 5px solid var(--primary);">
            <div style="display: flex; justify-content: center; margin-bottom: 30px;">
                <a href="../index.html" class="logo" style="text-decoration: none;">
                    <span>🐾</span> PetCare
                </a>
            </div>
            <div class="auth-title">
                <h2>Welcome Back</h2>
                <p>Login to manage your appointments</p>
            </div>
            <form id="loginForm">
                <div class="form-group">
                    <label>
                        <span style="margin-right: 5px;"></span> Email Address
                    </label>
                    <input type="email" id="email" placeholder="Enter your email" required>
                </div>
                <div class="form-group">
                    <label>
                        <span style="margin-right: 5px;"></span> Password
                    </label>
                    <input type="password" id="password" placeholder="Enter password" required>
                </div>

                <!-- Demo Credentials Box -->
                <div
                    style="background: #f8faff; border: 1px solid #d0d7de; padding: 20px; border-radius: 12px; margin-bottom: 25px; box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);">
                    <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 12px;">
                        <span style="font-size: 1.2rem;"></span>
                        <strong style="color: var(--primary); font-size: 14px;">Clinical Demo Access</strong>
                    </div>
                    <div style="display: grid; gap: 8px; font-size: 14px; color: var(--text-dark);">
                        <div
                            style="display: flex; justify-content: space-between; background: white; padding: 8px 12px; border-radius: 6px; border: 1px solid #f0f0f0;">
                            <span style="color: var(--text-light);">Email:</span>
                            <strong>admin@petcare.com</strong>
                        </div>
                        <div
                            style="display: flex; justify-content: space-between; background: white; padding: 8px 12px; border-radius: 6px; border: 1px solid #f0f0f0;">
                            <span style="color: var(--text-light);">Password:</span>
                            <strong>admin123</strong>
                        </div>
                    </div>
                </div>

                <div
                    style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; font-size: 14px;">
                    <label style="display: flex; align-items: center; gap: 5px; cursor: pointer;">
                        <input type="checkbox" style="width: auto;"> Remember me
                    </label>
                    <a href="#" style="color: var(--primary);">Forgot Password?</a>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; padding: 15px; font-size: 1rem;">
                    Sign In ➔
                </button>
            </form>

            <!-- Social Login -->
            <div class="social-login">
                <div class="social-title">Or continue with</div>
                <div class="social-buttons">
                    <div class="social-btn google" title="Google">
                        <svg viewBox="0 0 24 24" width="22" height="22" xmlns="http://www.w3.org/2000/svg">
                            <path
                                d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
                                fill="#4285F4" />
                            <path
                                d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-1 .67-2.28 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                                fill="#34A853" />
                            <path
                                d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"
                                fill="#FBBC05" />
                            <path
                                d="M12 5.38c1.62 0 3.06.56 4.21 1.66l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
                                fill="#EA4335" />
                        </svg>
                    </div>
                    <div class="social-btn facebook" title="Facebook"><i class="fa-brands fa-facebook-f"></i></div>
                    <div class="social-btn twitter" title="Twitter"><i class="fa-brands fa-twitter"></i></div>
                </div>
            </div>

            <div class="auth-link">
                Don't have an account? <a href="register.html">Register here</a>
            </div>

            <!-- Verification/Trust Section in Auth Card -->
            <div
                style="margin-top: 30px; padding-top: 20px; border-top: 1px solid #eee; display: flex; justify-content: center; gap: 20px;">
                <div style="font-size: 12px; color: var(--text-light); text-align: center;">
                    <div style="font-size: 1.5rem; margin-bottom: 5px;">🛡️</div>
                    Secure SSL
                </div>
                <div style="font-size: 12px; color: var(--text-light); text-align: center;">
                    <div style="font-size: 1.5rem; margin-bottom: 5px;">🔒</div>
                    Data Protected
                </div>
            </div>

            
        </div>
    </main>

    <script>
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            // Simple demo validation
            const users = JSON.parse(localStorage.getItem('users') || '[]');
            const user = users.find(u => u.email === email && u.password === password);

            if (user || (email === 'admin@petcare.com' && password === 'admin123')) {
                localStorage.setItem('isLoggedIn', 'true');
                localStorage.setItem('currentUser', email);
                alert('Login successful!');
                window.location.href = 'dashboard.html';
            } else {
                alert('Invalid email or password. Use admin@petcare.com / admin123 for demo.');
            }
        });

        // Social login handlers (demo)
        document.querySelectorAll('.social-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const platform = btn.title;
                alert(`${platform} login would be implemented here with OAuth integration.`);
            });
        });
    </script>
</body>

</html>
